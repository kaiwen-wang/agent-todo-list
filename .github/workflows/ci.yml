name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: bun install

      # Rust (CLI + lib + server)
      - name: Check (Rust)
        run: cargo check
        working-directory: src/rust

      - name: Format check (Rust)
        run: cargo fmt --check
        working-directory: src/rust

      - name: Clippy (Rust)
        run: cargo clippy -- -D warnings
        working-directory: src/rust

      - name: Test (Rust)
        run: cargo test
        working-directory: src/rust

      # Web (Vue 3 + Vite)
      - name: Lint (web)
        run: bun run --cwd src/web lint

      - name: Format check (web)
        run: bunx oxfmt --check src/web/src

      - name: Type check (web)
        run: bun run --cwd src/web type-check

      - name: Test (web)
        run: bun run --cwd src/web test:unit -- --run
